<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Design Dashboard Carousel</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
    }

    #stage {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background: #000;
    }

    .slide {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      display: none;
      background: #000;
      opacity: 0;
      transition: opacity 450ms linear;
    }

    .slide.active,
    .slide.previous {
      display: block;
    }

    .slide.active {
      opacity: 1;
      z-index: 2;
    }

    .slide.previous {
      opacity: 0;
      z-index: 1;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    #progress {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 8px;
      background: rgba(0, 72, 160, 0.35);
      z-index: 20;
    }

    #progressBar {
      width: 0%;
      height: 100%;
      background: #0b7cff;
    }

    #message {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 32px;
      box-sizing: border-box;
      z-index: 30;
      background: #000;
      text-align: center;
    }

    #message.visible {
      display: flex;
    }

    #messageText {
      max-width: 720px;
      color: #d9e6ff;
      font-size: 24px;
      line-height: 1.35;
    }

    #adminPanel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      z-index: 50;
      background: #05070b;
    }

    #adminPanel.visible {
      display: flex;
    }

    .admin-box {
      width: 100%;
      max-width: 560px;
      padding: 24px;
      box-sizing: border-box;
      border: 1px solid #22314f;
      background: #0b1020;
    }

    .admin-box h1 {
      margin: 0 0 18px;
      font-size: 24px;
      font-weight: 700;
    }

    .admin-box label {
      display: block;
      margin-bottom: 8px;
      color: #bdd2ff;
      font-size: 14px;
    }

    .admin-box input {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      box-sizing: border-box;
      border: 1px solid #3a4c72;
      border-radius: 0;
      background: #05070b;
      color: #fff;
      font-size: 15px;
    }

    .admin-actions {
      display: flex;
      margin-top: 16px;
    }

    .admin-actions button {
      height: 40px;
      margin-right: 10px;
      padding: 0 16px;
      border: 0;
      background: #0b7cff;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    .admin-actions button.secondary {
      background: #22314f;
    }

    #adminStatus {
      min-height: 20px;
      margin-top: 14px;
      color: #9dbdff;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="stage" aria-live="off"></div>
  <div id="progress"><div id="progressBar"></div></div>

  <div id="message" role="status" aria-live="polite">
    <div id="messageText"></div>
  </div>

  <div id="adminPanel">
    <div class="admin-box">
      <h1>Configuración Figma</h1>
      <label for="figmaToken">Token personal de Figma</label>
      <input id="figmaToken" type="text" autocomplete="off" spellcheck="false">
      <div class="admin-actions">
        <button id="saveToken" type="button">Guardar</button>
        <button id="clearToken" type="button" class="secondary">Borrar</button>
      </div>
      <div id="adminStatus"></div>
    </div>
  </div>

  <script>
    (function () {
      var FILE_KEY = 'BidKDsJvOdDy0xuFXEMg1F';
      var PAGE_NAME = 'carousel';
      var POLL_MS = 5 * 60 * 1000;
      var DEFAULT_SECONDS = 15;
      var IMAGE_SCALE = 1;
      var IMAGE_FORMAT = 'jpg';
      var LIGHTS_URL = 'ws://designlights.local/ws';
      var LIGHTS = {
        chase: '{"on":true,"bri":255,"playlist":{"ps":[6],"dur":[150],"transition":0,"repeat":1,"end":4}}',
        blends: '{"on":true,"bri":255,"playlist":{"ps":[7],"dur":[150],"transition":0,"repeat":1,"end":4}}',
        dancing: '{"on":true,"bri":255,"playlist":{"ps":[8],"dur":[150],"transition":0,"repeat":1,"end":4}}'
      };
      var REQUEST_TIMEOUT_MS = 20000;

      var stage = document.getElementById('stage');
      var progressBar = document.getElementById('progressBar');
      var message = document.getElementById('message');
      var messageText = document.getElementById('messageText');
      var adminPanel = document.getElementById('adminPanel');
      var tokenInput = document.getElementById('figmaToken');
      var saveToken = document.getElementById('saveToken');
      var clearToken = document.getElementById('clearToken');
      var adminStatus = document.getElementById('adminStatus');

      var token = '';
      var slides = [];
      var currentIndex = -1;
      var slideTimer = null;
      var progressFrame = null;
      var pollTimer = null;
      var lastModified = '';
      var lightsSocket = null;
      var lightsReady = false;
      var loadRequestId = 0;

      function isAdminMode() {
        return window.location.search.indexOf('admin') !== -1;
      }

      function showMessage(text) {
        messageText.innerHTML = text;
        message.className = 'visible';
      }

      function hideMessage() {
        message.className = '';
      }

      function showAdmin(text) {
        tokenInput.value = token;
        adminStatus.innerHTML = text || '';
        adminPanel.className = 'visible';
      }

      function hideAdmin() {
        adminPanel.className = '';
      }

      function withTimeout(promise, ms, label) {
        var timer;
        var timeout = new Promise(function (resolve, reject) {
          timer = setTimeout(function () {
            reject(new Error(label || 'TIMEOUT'));
          }, ms);
        });
        return Promise.race([promise, timeout]).then(function (value) {
          clearTimeout(timer);
          return value;
        }, function (err) {
          clearTimeout(timer);
          throw err;
        });
      }

      function apiFetch(path) {
        return withTimeout(fetch('https://api.figma.com/v1' + path, {
          headers: { 'X-Figma-Token': token }
        }), REQUEST_TIMEOUT_MS, 'TIMEOUT').then(function (res) {
          if (res.status === 401 || res.status === 403) {
            throw new Error('TOKEN');
          }
          if (!res.ok) {
            throw new Error('HTTP ' + res.status);
          }
          return withTimeout(res.json(), REQUEST_TIMEOUT_MS, 'TIMEOUT');
        });
      }

      function loadServerConfig() {
        return withTimeout(fetch('/api/carousel-config', { cache: 'no-store' }), REQUEST_TIMEOUT_MS, 'TIMEOUT').then(function (res) {
          if (!res.ok) {
            throw new Error('CONFIG');
          }
          return withTimeout(res.json(), REQUEST_TIMEOUT_MS, 'TIMEOUT');
        }).then(function (config) {
          token = config.figmaToken || '';
          FILE_KEY = config.fileKey || FILE_KEY;
          PAGE_NAME = normalizeName(config.pageName || PAGE_NAME);
          return config;
        }).catch(function () {
          token = '';
          showMessage('No se ha podido cargar la configuración local.<br>Revisa el servidor en <strong>http://raspberrydesign:7777/admin.html</strong>.');
          return null;
        });
      }

      function normalizeName(name) {
        return String(name || '').toLowerCase().replace(/^\s+|\s+$/g, '');
      }

      function findPage(documentNode) {
        var pages = documentNode && documentNode.children ? documentNode.children : [];
        for (var i = 0; i < pages.length; i++) {
          if (normalizeName(pages[i].name) === PAGE_NAME) {
            return pages[i];
          }
        }
        return null;
      }

      function walk(node, fn) {
        if (!node) return;
        fn(node);
        var children = node.children || [];
        for (var i = 0; i < children.length; i++) {
          walk(children[i], fn);
        }
      }

      function findNamedDescendant(root, name) {
        var found = null;
        walk(root, function (node) {
          if (!found && normalizeName(node.name) === normalizeName(name)) {
            found = node;
          }
        });
        return found;
      }

      function readTextInGroup(frame, groupName, textName) {
        var group = findNamedDescendant(frame, groupName);
        var textValue = '';
        if (!group) return '';
        walk(group, function (node) {
          if (!textValue && normalizeName(node.name) === normalizeName(textName) && typeof node.characters === 'string') {
            textValue = node.characters;
          }
        });
        return textValue;
      }

      function parseSeconds(value) {
        var match = String(value || '').replace(',', '.').match(/[0-9]+(?:\.[0-9]+)?/);
        var seconds = match ? parseFloat(match[0]) : DEFAULT_SECONDS;
        if (!isFinite(seconds) || seconds <= 0) {
          return DEFAULT_SECONDS;
        }
        return seconds;
      }

      function parseEffect(value) {
        var effect = normalizeName(value);
        if (effect === 'chase') return 'chase';
        if (effect === 'blends') return 'blends';
        if (effect === 'dancing') return 'dancing';
        return 'none';
      }

      function readEffectType(frame) {
        var group = findNamedDescendant(frame, 'Effect');
        var typeNode = null;
        var value = '';

        if (!group) return '';

        walk(group, function (node) {
          var props;

          if (!typeNode && normalizeName(node.name) === 'type') {
            typeNode = node;
            props = node.componentProperties || {};
            if (props.type && typeof props.type.value === 'string') {
              value = props.type.value;
            }
          }
        });

        if (value) return value;

        walk(typeNode || group, function (node) {
          if (!value && typeof node.characters === 'string') {
            value = node.characters;
          }
        });

        return value;
      }

      function sortFrames(a, b) {
        var an = parseInt(a.name, 10);
        var bn = parseInt(b.name, 10);
        if (isNaN(an)) an = 999999;
        if (isNaN(bn)) bn = 999999;
        if (an === bn) return String(a.name).localeCompare(String(b.name));
        return an - bn;
      }

      function extractSlides(fileData) {
        var page = findPage(fileData.document);
        var frames;
        if (!page) {
          throw new Error('PAGE');
        }
        frames = (page.children || []).filter(function (node) {
          return node.type === 'FRAME' && /^[0-9]+/.test(String(node.name || ''));
        });
        frames.sort(sortFrames);
        if (!frames.length) {
          throw new Error('SLIDES');
        }
        return frames.map(function (frame) {
          return {
            id: frame.id,
            name: frame.name,
            seconds: parseSeconds(readTextInGroup(frame, 'Time', 'Seconds')),
            effect: parseEffect(readEffectType(frame)),
            imageUrl: ''
          };
        });
      }

      function loadImageUrls(nextSlides, statusFn) {
        var index = 0;

        function loadOne() {
          var slide;

          if (index >= nextSlides.length) {
            return Promise.resolve(nextSlides.filter(function (item) { return !!item.imageUrl; }));
          }

          slide = nextSlides[index];
          if (statusFn) {
            statusFn('Exportando imagen ' + (index + 1) + ' de ' + nextSlides.length + '...');
          }

          return apiFetch('/images/' + encodeURIComponent(FILE_KEY) + '?ids=' + encodeURIComponent(slide.id) + '&format=' + IMAGE_FORMAT + '&scale=' + IMAGE_SCALE + '&contents_only=true&use_absolute_bounds=true').then(function (data) {
            var images = data.images || {};
            slide.imageUrl = images[slide.id] || '';
            index++;
            return loadOne();
          });
        }

        return loadOne();
      }

      function loadSlides(force, statusFn) {
        var requestId = ++loadRequestId;

        if (!token) {
          stopCarousel();
          showMessage('No hay token de Figma configurado.<br>Configúralo en <strong>http://raspberrydesign:7777/admin.html</strong>.');
          return Promise.resolve(false);
        }

        function setStatus(text) {
          if (requestId === loadRequestId && statusFn) {
            statusFn(text);
          }
        }

        setStatus('Leyendo archivo de Figma...');
        return apiFetch('/files/' + encodeURIComponent(FILE_KEY)).then(function (fileData) {
          if (requestId !== loadRequestId) return false;
          if (!force && lastModified && fileData.lastModified === lastModified) {
            setStatus('No hay cambios nuevos en Figma.');
            return true;
          }
          lastModified = fileData.lastModified || String(new Date().getTime());
          setStatus('Extrayendo slides...');
          return loadImageUrls(extractSlides(fileData), setStatus).then(function (nextSlides) {
            if (requestId !== loadRequestId) return false;
            if (!nextSlides.length) {
              throw new Error('IMAGES');
            }
            slides = nextSlides;
            renderSlides();
            startCarousel();
            hideMessage();
            return true;
          });
        }).catch(function (err) {
          if (requestId !== loadRequestId) return false;
          stopCarousel();
          if (err && err.message === 'TOKEN') {
            showMessage('El token de Figma no está configurado o ha caducado.<br>Abre <strong>http://raspberrydesign:7777/admin.html</strong> y guarda un token válido.');
          } else if (err && err.message === 'PAGE') {
            showMessage('No se ha encontrado la página <strong>carousel</strong> en el archivo de Figma.');
          } else if (err && err.message === 'SLIDES') {
            showMessage('No se han encontrado frames numerados en la página <strong>carousel</strong>.');
          } else {
            showMessage('No se han podido extraer las slides de Figma.');
          }
          setStatus(messageText.innerHTML.replace(/<[^>]+>/g, ' '));
          return false;
        });
      }

      function renderSlides() {
        stage.innerHTML = '';
        for (var i = 0; i < slides.length; i++) {
          var slideEl = document.createElement('div');
          var img = document.createElement('img');
          slideEl.className = 'slide';
          slideEl.setAttribute('data-index', i);
          img.alt = '';
          img.draggable = false;
          img.src = slides[i].imageUrl;
          slideEl.appendChild(img);
          stage.appendChild(slideEl);
        }
      }

      function startCarousel() {
        if (!slides.length) return;
        clearTimeout(slideTimer);
        currentIndex = currentIndex < 0 || currentIndex >= slides.length ? 0 : currentIndex;
        showSlide(currentIndex);
      }

      function stopCarousel() {
        clearTimeout(slideTimer);
        stopProgress();
        progressBar.style.width = '0%';
      }

      function stopProgress() {
        if (progressFrame) {
          (window.cancelAnimationFrame || clearTimeout)(progressFrame);
          progressFrame = null;
        }
      }

      function startProgress(duration) {
        var start = new Date().getTime();
        var raf = window.requestAnimationFrame || function (fn) {
          return setTimeout(fn, 16);
        };

        stopProgress();
        progressBar.style.width = '0%';

        function tick() {
          var elapsed = new Date().getTime() - start;
          var pct = Math.min(100, elapsed / duration * 100);

          progressBar.style.width = pct + '%';

          if (pct < 100) {
            progressFrame = raf(tick);
          } else {
            progressFrame = null;
          }
        }

        progressFrame = raf(tick);
      }

      function showSlide(index) {
        var slideEls = stage.getElementsByClassName('slide');
        var duration;
        var i;

        clearTimeout(slideTimer);
        stopProgress();

        if (!slides.length || !slideEls.length) return;
        if (index >= slides.length) index = 0;
        if (index < 0) index = slides.length - 1;

        for (i = 0; i < slideEls.length; i++) {
          if (slideEls[i].className.indexOf('active') !== -1) {
            slideEls[i].className = 'slide previous';
          } else {
            slideEls[i].className = 'slide';
          }
        }

        slideEls[index].className = 'slide active';
        currentIndex = index;
        sendLight(slides[index].effect);

        setTimeout(function () {
          for (var j = 0; j < slideEls.length; j++) {
            if (j !== currentIndex) {
              slideEls[j].className = 'slide';
            }
          }
        }, 550);

        duration = Math.max(1, slides[index].seconds) * 1000;
        startProgress(duration);
        slideTimer = setTimeout(function () {
          showSlide(currentIndex + 1);
        }, duration);
      }

      function connectLights() {
        try {
          lightsSocket = new WebSocket(LIGHTS_URL);
          lightsSocket.onopen = function () {
            lightsReady = true;
          };
          lightsSocket.onclose = function () {
            lightsReady = false;
            setTimeout(connectLights, 5000);
          };
          lightsSocket.onerror = function () {
            lightsReady = false;
          };
        } catch (err) {
          lightsReady = false;
        }
      }

      function sendLight(effect) {
        var payload = LIGHTS[effect];
        if (!payload || !lightsReady || !lightsSocket || lightsSocket.readyState !== 1) {
          return;
        }
        try {
          lightsSocket.send(payload);
        } catch (err) {}
      }

      function startPolling() {
        clearInterval(pollTimer);
        pollTimer = setInterval(function () {
          loadServerConfig().then(function (config) {
            if (config) {
              loadSlides(false);
            }
          });
        }, POLL_MS);
      }

      saveToken.onclick = function () {
        token = tokenInput.value.replace(/^\s+|\s+$/g, '');
        if (!token) {
          adminStatus.innerHTML = 'Pega un token de Figma antes de guardar.';
          return;
        }
        adminStatus.innerHTML = 'Token guardado. Probando conexión...';
        lastModified = '';
        loadSlides(true, function (text) {
          adminStatus.innerHTML = text;
        }).then(function (ok) {
          if (ok) {
            adminStatus.innerHTML = 'Listo. Abre <strong>/index.html</strong> para ver el carrusel.';
          }
        });
      };

      clearToken.onclick = function () {
        token = '';
        tokenInput.value = '';
        stopCarousel();
        stage.innerHTML = '';
        adminStatus.innerHTML = 'Token borrado.';
      };

      connectLights();
      startPolling();

      if (isAdminMode()) {
        window.location.href = '/admin.html';
        return;
      }

      hideAdmin();
      loadServerConfig().then(function (config) {
        if (config) {
          loadSlides(true);
        }
      });
    })();
  </script>
</body>
</html>
