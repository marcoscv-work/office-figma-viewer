<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1778 976" role="img" aria-labelledby="title desc">
  <title id="title">Figma structure reference</title>
  <desc id="desc">A visual reference showing a numbered slide frame with Time and Effect groups outside the frame bounds.</desc>
  <rect width="1778" height="976" fill="#1f1f1f"/>
  <text x="306" y="106" fill="#9b9b9b" font-family="Arial, Helvetica, sans-serif" font-size="24">1</text>

  <text x="160" y="178" fill="#f5f5f5" font-family="Arial, Helvetica, sans-serif" font-size="24">Slide time</text>
